name: Secondbrain sync

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sync:
    name: Mirror exported files into the second brain
    runs-on: ubuntu-latest
    concurrency:
      group: secondbrain-sync-${{ github.repository }}
      cancel-in-progress: true
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v7
        with:
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Mint secondbrain token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SECONDBRAIN_APP_CLIENT_ID }}
          private-key: ${{ secrets.SECONDBRAIN_APP_PRIVATE_KEY }}
          owner: marcioaltoe
          repositories: secondbrain
          permission-contents: write

      - name: Checkout secondbrain
        uses: actions/checkout@v7
        with:
          repository: marcioaltoe/secondbrain
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: secondbrain
          fetch-depth: 0

      - name: Synchronize mirror
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash secondbrain/scripts/sync-project.sh \
            source secondbrain \
            "$SOURCE_REPOSITORY" "$SOURCE_SHA" "$SOURCE_REF" "$SOURCE_RUN_URL"
