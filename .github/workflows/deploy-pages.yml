name: Deploy catalog to Pages

# Builds the Astro skills catalog and publishes it to GitHub Pages.
# Requires: repo Settings → Pages → Source = "GitHub Actions" (one-time setup).

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "setups/**"
      - "web/**"
      - "skills-registry.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment queue; let in-flight deploys finish so
# a cancelled run never leaves Pages half-applied.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build catalog
        run: npm run build
        working-directory: web
        env:
          PAGES_BASE: /skills
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
