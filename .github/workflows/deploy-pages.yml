name: Deploy catalog to Pages

# Builds the Astro skills catalog and publishes it to GitHub Pages.
# Requires: repo Settings → Pages → Source = "GitHub Actions" (one-time setup).

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "setups/**"
      - "web/**"
      - "skills-registry.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build catalog
        run: npm run build
        working-directory: web
        env:
          PAGES_BASE: /skills
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
