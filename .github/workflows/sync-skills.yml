name: Sync upstream skills

# Syncs vendored skills with their upstream repos and opens a PR with the
# updated skill content plus a report. Tracked sources live in
# skills-registry.json (entries with a `repo`); baselines live in
# skills-registry.lock.json. Each vendored entry can set `update` to `off`,
# `auto`, or `manual`.
#
# Runs daily and on demand (Actions → "Sync upstream skills" → Run workflow).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync upstream skills
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-skills.mjs

      - name: Open / update sync PR
        id: cpr
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: ma/skills-upstream-sync
          delete-branch: true
          title: "chore(skills): sync upstream skills"
          body-path: sync-report.md
          commit-message: "chore(skills): sync upstream skills"
          add-paths: |
            skills-registry.lock.json
            skills/**
          labels: skills-sync

      - name: Enable auto-merge for auto-only sync
        if: steps.sync.outputs.auto_merge == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Job summary
        if: always()
        run: cat sync-report.md >> "$GITHUB_STEP_SUMMARY"
