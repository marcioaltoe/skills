name: CI | Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: List discoverable skills
        run: npx --yes skills add . --list

      - name: Fail if no skills discovered
        run: |
          OUTPUT=$(npx --yes skills add . --list 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "no skills"; then
            echo "::error::No skills discovered. Check frontmatters in skills/."
            exit 1
          fi

      - name: Check marketplace.json is in sync with the registry
        run: |
          node scripts/build-marketplace.mjs
          git diff --exit-code -- .claude-plugin/marketplace.json || {
            echo "::error::.claude-plugin/marketplace.json is out of date. Run 'make marketplace' and commit the result.";
            exit 1;
          }
