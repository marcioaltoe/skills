name: CI | Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: List discoverable skills
        run: |
          OUTPUT=$(npx --yes skills add . --list 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "no skills"; then
            echo "::error::No skills discovered. Check frontmatters in skills/."
            exit 1
          fi

      - name: Check setup presets
        run: node scripts/check-setups.mjs

      - name: Check registry consistency
        run: node scripts/check-registry.mjs
