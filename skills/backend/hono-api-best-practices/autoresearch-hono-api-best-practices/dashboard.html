<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Autoresearch — hono-api-best-practices</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fbfcfe; --card: #ffffff; --ink: #2b2f36; --muted: #8a93a2;
    --line: #e7ebf1; --keep: #9ad6a8; --discard: #f3b0b0; --base: #a9c7ef;
    --accent: #aa96da;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 22px 28px 8px; }
  h1 { margin: 0; font-size: 19px; font-weight: 650; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .wrap { padding: 12px 28px 40px; max-width: 1100px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .stat .val { font-size: 26px; font-weight: 680; margin-top: 4px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.running { background: #fff6da; color: #8a6d00; }
  .pill.complete { background: #e3f5e8; color: #2c7a42; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 12px; font-size: 14px; font-weight: 650; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  .tag { padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 650; }
  .tag.keep { background: var(--keep); color: #16431f; }
  .tag.discard { background: var(--discard); color: #6a1414; }
  .tag.baseline { background: var(--base); color: #143a6a; }
  .bars { display: flex; gap: 5px; align-items: flex-end; height: 120px; padding-top: 8px; }
  .bar { flex: 1; border-radius: 4px 4px 0 0; min-width: 8px; position: relative; }
  .bar span { position: absolute; bottom: -18px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--muted); }
  .evalrow { display: flex; align-items: center; gap: 10px; margin: 7px 0; font-size: 13px; }
  .evalrow .name { width: 230px; }
  .track { flex: 1; height: 9px; background: #eef1f6; border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; background: var(--accent); }
  .evalrow .pct { width: 70px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .muted { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Autoresearch · hono-api-best-practices</h1>
  <div class="sub" id="statusline">Loading…</div>
</header>
<div class="wrap">
  <div class="grid">
    <div class="stat"><div class="label">Status</div><div class="val" id="s-status">—</div></div>
    <div class="stat"><div class="label">Baseline</div><div class="val" id="s-base">—</div></div>
    <div class="stat"><div class="label">Best</div><div class="val" id="s-best">—</div></div>
    <div class="stat"><div class="label">Experiments</div><div class="val" id="s-count">—</div></div>
  </div>

  <div class="card">
    <h2>Pass rate over experiments</h2>
    <canvas id="chart" height="90"></canvas>
  </div>

  <div class="card">
    <h2>Per-experiment outcome</h2>
    <div class="bars" id="bars"></div>
  </div>

  <div class="card">
    <h2>Eval breakdown (across all kept runs)</h2>
    <div id="evals"></div>
  </div>

  <div class="card">
    <h2>Experiment log</h2>
    <table>
      <thead><tr><th>#</th><th>Score</th><th>Pass rate</th><th>Status</th><th>Description</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
let chart;
async function load() {
  let d;
  try { d = await (await fetch('results.json?' + Date.now())).json(); }
  catch (e) { document.getElementById('statusline').textContent = 'Waiting for results.json…'; return; }

  const max = d.max_score || 25;
  const running = d.status === 'running';
  document.getElementById('statusline').innerHTML =
    (running ? '<span class="pill running">running</span> experiment ' + d.current_experiment
             : '<span class="pill complete">complete</span>') +
    ' · max score ' + max;
  document.getElementById('s-status').textContent = running ? '▶' : '✓';
  document.getElementById('s-base').textContent = d.baseline_score != null ? d.baseline_score + '/' + max : '—';
  document.getElementById('s-best').textContent = d.best_score != null ? d.best_score + '/' + max : '—';
  document.getElementById('s-count').textContent = d.experiments.length;

  // table
  document.getElementById('rows').innerHTML = d.experiments.map(e =>
    '<tr><td>' + e.id + '</td><td>' + e.score + '/' + (e.max_score || max) + '</td><td>' +
    e.pass_rate.toFixed(1) + '%</td><td><span class="tag ' + e.status + '">' + e.status +
    '</span></td><td>' + (e.description || '') + '</td></tr>').join('');

  // bars
  document.getElementById('bars').innerHTML = d.experiments.map(e => {
    const h = Math.max(6, e.pass_rate);
    const c = e.status === 'keep' ? 'var(--keep)' : e.status === 'discard' ? 'var(--discard)' : 'var(--base)';
    return '<div class="bar" style="height:' + h + '%;background:' + c + '" title="exp ' + e.id + ': ' +
      e.pass_rate.toFixed(0) + '%"><span>' + e.id + '</span></div>';
  }).join('');

  // evals
  document.getElementById('evals').innerHTML = (d.eval_breakdown || []).map(ev => {
    const pct = ev.total ? (100 * ev.pass_count / ev.total) : 0;
    return '<div class="evalrow"><div class="name">' + ev.name + '</div><div class="track"><div class="fill" style="width:' +
      pct + '%"></div></div><div class="pct">' + ev.pass_count + '/' + ev.total + '</div></div>';
  }).join('');

  // chart
  const labels = d.experiments.map(e => e.id);
  const data = d.experiments.map(e => e.pass_rate);
  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels, datasets: [{ label: 'pass rate %', data, borderColor: '#aa96da',
        backgroundColor: 'rgba(170,150,218,.12)', fill: true, tension: .25, pointRadius: 4 }] },
      options: { scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } },
        plugins: { legend: { display: false } } }
    });
  } else {
    chart.data.labels = labels; chart.data.datasets[0].data = data; chart.update();
  }
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
