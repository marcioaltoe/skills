<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autoresearch — hono-api-best-practices</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
      :root {
        --bg: #fbfcfe;
        --card: #ffffff;
        --ink: #2b3140;
        --muted: #8a93a6;
        --line: #ecdff0;
        --keep: #b5ead7;
        --keep-ink: #2f7d5b;
        --discard: #fcbad3;
        --discard-ink: #b14b6e;
        --base: #a8d8ea;
        --base-ink: #2f6a82;
        --accent: #aa96da;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 28px;
      }
      h1 { font-size: 20px; margin: 0 0 2px; }
      .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 18px;
        box-shadow: 0 1px 2px rgba(40, 30, 50, 0.03);
      }
      .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
      .card .value { font-size: 26px; font-weight: 650; margin-top: 6px; }
      .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
      .panel h2 { font-size: 14px; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); }
      th { color: var(--muted); font-weight: 600; }
      .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
      .pill.keep { background: var(--keep); color: var(--keep-ink); }
      .pill.discard { background: var(--discard); color: var(--discard-ink); }
      .pill.baseline { background: var(--base); color: var(--base-ink); }
      .status-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
      .running { background: var(--accent); animation: pulse 1.2s infinite; }
      .complete { background: var(--keep-ink); }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
      .bars { display: flex; gap: 6px; align-items: flex-end; height: 90px; }
      .bar { flex: 1; border-radius: 6px 6px 0 0; min-height: 4px; }
      .bar.keep { background: var(--keep); }
      .bar.discard { background: var(--discard); }
      .bar.baseline { background: var(--base); }
      .evalrow { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; }
      .evalrow .name { width: 220px; }
      .track { flex: 1; background: #f1eef6; border-radius: 999px; height: 10px; overflow: hidden; }
      .fill { height: 100%; background: var(--accent); }
      .muted { color: var(--muted); }
    </style>
  </head>
  <body>
    <h1>Autoresearch · hono-api-best-practices</h1>
    <div class="sub">
      <span id="statusDot" class="status-dot running"></span>
      <span id="statusText">Loading…</span> · auto-refreshes every 10s
    </div>

    <div class="grid">
      <div class="card"><div class="label">Baseline</div><div class="value" id="baseline">—</div></div>
      <div class="card"><div class="label">Best</div><div class="value" id="best">—</div></div>
      <div class="card"><div class="label">Current exp.</div><div class="value" id="current">—</div></div>
      <div class="card"><div class="label">Experiments</div><div class="value" id="count">—</div></div>
    </div>

    <div class="panel">
      <h2>Score progression (pass rate %)</h2>
      <canvas id="chart" height="90"></canvas>
    </div>

    <div class="panel">
      <h2>Experiments</h2>
      <div class="bars" id="bars"></div>
    </div>

    <div class="panel">
      <h2>Per-eval breakdown (all runs)</h2>
      <div id="evals"></div>
    </div>

    <div class="panel">
      <h2>Log</h2>
      <table>
        <thead><tr><th>#</th><th>Score</th><th>Pass rate</th><th>Status</th><th>Description</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script>
      let chart;
      async function load() {
        let d;
        try {
          d = await (await fetch("results.json?_=" + Date.now())).json();
        } catch (e) {
          document.getElementById("statusText").textContent = "Waiting for results.json…";
          return;
        }
        const exps = d.experiments || [];
        document.getElementById("baseline").textContent = d.baseline_score != null ? d.baseline_score + "%" : "—";
        document.getElementById("best").textContent = d.best_score != null ? d.best_score + "%" : "—";
        document.getElementById("current").textContent = d.current_experiment != null ? "#" + d.current_experiment : "—";
        document.getElementById("count").textContent = exps.length;

        const dot = document.getElementById("statusDot");
        const txt = document.getElementById("statusText");
        if (d.status === "complete") {
          dot.className = "status-dot complete";
          txt.textContent = "Done — best " + (d.best_score ?? "—") + "%";
        } else {
          dot.className = "status-dot running";
          txt.textContent = "Running experiment " + (d.current_experiment ?? "?") + "…";
        }

        document.getElementById("rows").innerHTML = exps
          .map(
            (e) =>
              `<tr><td>${e.id}</td><td>${e.score}/${e.max_score}</td><td>${e.pass_rate}%</td>` +
              `<td><span class="pill ${e.status}">${e.status}</span></td><td>${e.description}</td></tr>`
          )
          .join("");

        const maxScore = exps.length ? exps[0].max_score : 25;
        document.getElementById("bars").innerHTML = exps
          .map((e) => `<div class="bar ${e.status}" style="height:${(e.score / maxScore) * 100}%" title="#${e.id}: ${e.pass_rate}%"></div>`)
          .join("");

        document.getElementById("evals").innerHTML = (d.eval_breakdown || [])
          .map((ev) => {
            const pct = ev.total ? Math.round((ev.pass_count / ev.total) * 100) : 0;
            return `<div class="evalrow"><div class="name">${ev.name}</div><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="muted">${ev.pass_count}/${ev.total}</div></div>`;
          })
          .join("");

        const labels = exps.map((e) => "#" + e.id);
        const data = exps.map((e) => e.pass_rate);
        if (!chart) {
          chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: { labels, datasets: [{ data, borderColor: "#aa96da", backgroundColor: "rgba(170,150,218,.15)", fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: "#aa96da" }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: { callback: (v) => v + "%" } } } },
          });
        } else {
          chart.data.labels = labels;
          chart.data.datasets[0].data = data;
          chart.update();
        }
      }
      load();
      setInterval(load, 10000);
    </script>
  </body>
</html>
