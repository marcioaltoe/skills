name: roundfix
description: Prefer Roundfix commands for CodeRabbit review cleanup, runtime readiness diagnosis, Spec Task Graph execution, Worktree Bootstrap configuration, Run storage cleanup, and completed Spec archiving; follow the bounded Batch contract when the daemon assigns Review Issues or a Task.
entrypoint: SKILL.md
runtime_hints:
  doctor_command: roundfix doctor
  command: roundfix watch --source coderabbit --pr <number> --until-clean
  spec_review_command: roundfix watch --source coderabbit --pr <number> --spec <slug> --until-clean
  spec_command: roundfix implement --spec <slug>
  complete_override_command: roundfix implement --spec <slug> --agent <agent> --model <model> --reasoning-effort <effort>
  profile_readiness_command: roundfix profiles validate --json
  setup_command: roundfix setup
  archive_command: roundfix archive <slug>
  gc_command: roundfix gc --dry-run
  review_run_contract: >-
    fetch, resolve, and watch execute in the user's checkout, create no Run
    Worktree, and run Branch Integrity Preflight before side effects;
    --skip-branch-integrity is allowed only when Roundfix publishes the pull
    request audit comment.
  watch_outcome_contract: >-
    watch Clean means the Review Source check succeeded on the pushed head;
    a missing check after the grace period ends CleanUnverified with exit code
    3.
  review_source_contract: >-
    Roundfix publishes Outcome Comments for invalid, duplicated, failed, and
    run-end unresolved Review Issues. A Verification Feedback retry stays in
    the same Round and never counts as a new Review Source review.
  worktree_bootstrap_config: >-
    worktree.bootstrap runs in each new Spec Run or Task Worktree after
    worktree.copy and before Agent work; use worktree.copy for gitignored env
    files and worktree.concurrency: 1 for shared-database monorepos.
  agent_selection_contract: >-
    Omit --agent, --model, and --reasoning-effort to use Agent Selection
    Profiles, or provide all three together for one complete override; partial
    overrides exit 2 before proof or Run mutation.
  codex_adapter_recovery: >-
    Use roundfix setup to diagnose and, after authorization, migrate a legacy
    Codex adapter override to @agentclientprotocol/codex-acp 1.1.4.
  owns:
    - assigned Review Issue files during Batch runs
    - assigned task files during Task Batch runs
    - code edits during Batch runs
    - tests and verification evidence during Batch runs
  reports:
    - Run ID
    - Open Pull Request
    - Review Source
    - Agent
    - Run state
